<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.4/build/css/intlTelInput.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link href="Content/css/login.8ccf3f3afdcd6a82e1f6.css" rel="stylesheet"></head><body><header class="top-header"><iconify-icon icon="grommet-icons:user-admin" class="header-icon"></iconify-icon><h1>Admin Panel</h1></header><div class="container"><div class="card"><div class="card-header"><h2>Login</h2><p>Enter your phone number to receive a one-time password.</p></div><div class="card-content"><div id="step-phone" class="step active"><form id="phone-form"><div class="form-group" id="phone-wrapper"><label for="phone">Phone Number</label><div class="input-group"><input type="tel" id="phone" autocomplete="tel" required></div><div id="phone-error" class="error-msg"></div></div><button type="submit" class="btn btn-primary" id="send-otp-btn"><span class="loader"></span> <span class="btn-text">Send OTP</span></button><p class="help-text text-center mt-4">By continuing, you agree to our Terms of Service and Privacy Policy.</p></form></div><div id="step-otp" class="step"><form id="otp-form"><div class="form-group"><label>One-Time Password</label><p class="help-text mb-4">Code sent to <span id="display-phone" class="font-medium text-foreground"></span></p><div class="otp-input-group"><input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required> <input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required> <input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required> <input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required> <input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required> <input type="text" maxlength="1" pattern="[0-9]" class="otp-input" inputmode="numeric" required></div><div id="otp-error" class="error-msg">Invalid OTP code. Please try again.</div></div><button type="submit" class="btn btn-primary mt-4" id="verify-otp-btn"><span class="loader"></span> <span class="btn-text">Verify</span></button><div class="flex-between mt-4"><button type="button" class="btn btn-ghost btn-sm" id="back-btn">Back</button> <button type="button" class="btn btn-ghost btn-sm" id="resend-btn" disabled="disabled">Resend Code <span id="timer">(00:30)</span></button></div></form></div><div id="step-success" class="step"><div class="success-content text-center py-4"><div class="success-icon mb-4"><iconify-icon icon="icon-park-outline:success"></iconify-icon></div><h3 class="text-xl font-medium mb-2">Login Successful</h3><p class="help-text">You have been successfully verified.</p></div></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.4/build/js/intlTelInput.min.js"></script><script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script><script defer="defer" src="Content/js/login.438483c689d22625d684.js"></script></body></html>
